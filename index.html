<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#6366f1"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="JobPilot"/>
  <title>JobPilot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0c0c14;color:#e8e6f0;font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:80px}
    .header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid #2a2a45;padding:18px 18px 0}
    .header-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    h1{font-family:'Syne',sans-serif;font-size:19px;font-weight:800}
    .badge{background:#6366f1;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:1px}
    .sub{font-size:12px;color:#8884a8;margin:4px 0 14px 42px}
    .tabs{display:flex;gap:3px}
    .tab{background:transparent;color:#8884a8;border:none;border-radius:8px 8px 0 0;padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
    .tab.active{background:#6366f1;color:#fff}
    .content{padding:18px;max-width:680px;margin:0 auto}
    .panel{display:none;flex-direction:column;gap:14px}
    .panel.active{display:flex}
    label{font-size:11px;font-weight:600;color:#8884a8;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px}
    textarea,input,select{width:100%;background:#1e1e35;border:1px solid #2a2a45;border-radius:10px;color:#e8e6f0;padding:11px 13px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
    textarea:focus,input:focus,select:focus{border-color:#6366f1}
    textarea{resize:vertical}
    select option{background:#1e1e35}
    .platforms{display:flex;gap:7px;flex-wrap:wrap}
    .plat{background:#1e1e35;color:#8884a8;border:1px solid #2a2a45;border-radius:8px;padding:6px 13px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
    .plat.active{background:#6366f1;color:#fff;border-color:#6366f1}
    .btn-gen{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;box-shadow:0 4px 20px rgba(99,102,241,.35);transition:all .3s}
    .btn-gen:disabled{background:#3b3b60;box-shadow:none;cursor:not-allowed}
    .out-tabs{display:flex;gap:7px;align-items:center}
    .out-tab{background:transparent;color:#8884a8;border:1px solid transparent;border-radius:8px;padding:7px 15px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
    .out-tab.active{background:#1e1e35;color:#e8e6f0;border-color:#2a2a45}
    .copy-btn{margin-left:auto;background:#1e1e35;color:#8884a8;border:1px solid #2a2a45;border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
    .output-box{background:#1e1e35;border:1px solid #2a2a45;border-radius:10px;padding:15px;font-size:13.5px;line-height:1.7;color:#d4d0e8;white-space:pre-wrap;max-height:320px;overflow-y:auto;min-height:120px}
    .placeholder{background:#1e1e35;border:1px dashed #2a2a45;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:200px;color:#4a4870}
    .placeholder .icon{font-size:36px}
    .err{color:#ef4444;font-size:13px}
    .card{background:#1e1e35;border:1px solid #2a2a45;border-radius:12px;padding:16px}
    .card-title{font-size:11px;font-weight:600;color:#8884a8;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn-add{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;width:100%;margin-top:8px}
    .filter-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
    .filters{display:flex;gap:6px;flex-wrap:wrap}
    .filter-btn{background:#1e1e35;color:#8884a8;border:1px solid #2a2a45;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
    .export-btn{background:transparent;color:#6366f1;border:1px solid #6366f1;border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
    .app-item{background:#1e1e35;border:1px solid #2a2a45;border-radius:10px;padding:13px 15px;display:flex;flex-direction:column;gap:6px}
    .app-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .app-company{font-weight:600;font-size:14px}
    .app-role{font-size:12px;color:#8884a8}
    .app-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .app-platform{font-size:12px;color:#8884a8}
    .app-date{font-size:12px;color:#6661a8}
    .status-sel{border-radius:20px;padding:4px 10px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;outline:none;cursor:pointer;border-width:1px;border-style:solid}
    .del-btn{background:transparent;color:#4a4870;border:none;font-size:18px;cursor:pointer;flex-shrink:0;line-height:1}
    .empty{text-align:center;color:#4a4870;padding:32px 0;font-size:14px}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .kpi{background:#1e1e35;border:1px solid #2a2a45;border-radius:12px;padding:18px;text-align:center}
    .kpi-icon{font-size:26px;margin-bottom:6px}
    .kpi-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#6366f1}
    .kpi-label{font-size:12px;color:#8884a8;margin-top:4px}
    .bar-row{margin-bottom:10px}
    .bar-label{display:flex;justify-content:space-between;margin-bottom:4px}
    .bar-bg{background:#0c0c14;border-radius:4px;height:6px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width .5s}
    .plat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .plat-card{text-align:center;background:#0c0c14;border-radius:10px;padding:14px}
    .plat-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
    .plat-name{font-size:12px;color:#8884a8;margin-top:3px}
    @media(max-width:480px){.form-row{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">✦</div>
    <h1>JobPilot</h1>
    <span class="badge">BETA</span>
  </div>
  <p class="sub">Automatisez vos candidatures · Suivez vos progrès</p>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('gen')">Générer</button>
    <button class="tab" onclick="switchTab('tracker')">Tracker</button>
    <button class="tab" onclick="switchTab('stats')">Stats</button>
  </div>
</div>

<div class="content">

  <!-- GENERATE -->
  <div id="panel-gen" class="panel active">
    <div>
      <label>Plateforme</label>
      <div class="platforms" id="platforms">
        <button class="plat active" onclick="setPlatform(this,'LinkedIn')">LinkedIn</button>
        <button class="plat" onclick="setPlatform(this,'Indeed')">Indeed</button>
        <button class="plat" onclick="setPlatform(this,'WTTJ')">Welcome to the Jungle</button>
        <button class="plat" onclick="setPlatform(this,'Autre')">Autre</button>
      </div>
    </div>
    <div>
      <label>Votre CV (texte)</label>
      <textarea id="cv" rows="6" placeholder="Collez ici le texte de votre CV : expériences, compétences, formation..."></textarea>
    </div>
    <div>
      <label>Offre d'emploi</label>
      <textarea id="offer" rows="5" placeholder="Collez ici la description complète de l'offre d'emploi..."></textarea>
    </div>
    <div id="api-key-section">
      <label>Clé API Anthropic</label>
      <input type="password" id="apikey" placeholder="sk-ant-..." />
      <p style="font-size:11px;color:#6661a8;margin-top:5px">Obtenez votre clé sur <a href="https://console.anthropic.com" target="_blank" style="color:#6366f1">console.anthropic.com</a> · Elle est stockée localement, jamais envoyée ailleurs</p>
    </div>
    <p id="gen-err" class="err" style="display:none"></p>
    <button class="btn-gen" id="btn-gen" onclick="handleGenerate()">✦ Générer la candidature</button>

    <div id="output-section" style="display:none;flex-direction:column;gap:10px">
      <div class="out-tabs">
        <button class="out-tab active" onclick="switchOutput('email',this)">📧 Email</button>
        <button class="out-tab" onclick="switchOutput('lettre',this)">📄 Lettre</button>
        <button class="copy-btn" onclick="copyOutput()">Copier</button>
      </div>
      <div id="output-box" class="output-box"></div>
      <button onclick="switchTab('tracker')" style="background:#1e1e35;color:#8884a8;border:1px solid #2a2a45;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif">→ Voir le tracker</button>
    </div>
  </div>

  <!-- TRACKER -->
  <div id="panel-tracker" class="panel">
    <div class="card">
      <p class="card-title">Ajouter une candidature</p>
      <div class="form-row">
        <div><label>Entreprise</label><input id="t-company" placeholder="Ex: Google"/></div>
        <div><label>Poste</label><input id="t-role" placeholder="Ex: UX Designer"/></div>
        <div>
          <label>Plateforme</label>
          <select id="t-platform">
            <option>LinkedIn</option><option>Indeed</option><option>Welcome to the Jungle</option><option>Autre</option>
          </select>
        </div>
        <div>
          <label>Statut</label>
          <select id="t-status">
            <option>Envoyée</option><option>En attente</option><option>Entretien</option><option>Refus</option><option>Offre</option>
          </select>
        </div>
      </div>
      <button class="btn-add" onclick="addApplication()">+ Ajouter</button>
    </div>

    <div class="filter-row">
      <div class="filters" id="filters">
        <button class="filter-btn active" onclick="setFilter('Tout',this)">Tout</button>
        <button class="filter-btn" onclick="setFilter('Envoyée',this)">Envoyée</button>
        <button class="filter-btn" onclick="setFilter('En attente',this)">En attente</button>
        <button class="filter-btn" onclick="setFilter('Entretien',this)">Entretien</button>
        <button class="filter-btn" onclick="setFilter('Refus',this)">Refus</button>
        <button class="filter-btn" onclick="setFilter('Offre',this)">Offre</button>
      </div>
      <button class="export-btn" onclick="exportCSV()">↓ CSV</button>
    </div>

    <div id="app-list"></div>
  </div>

  <!-- STATS -->
  <div id="panel-stats" class="panel">
    <div class="stats-grid" id="kpis"></div>
    <div class="card">
      <p class="card-title">Par statut</p>
      <div id="status-bars"></div>
    </div>
    <div class="card">
      <p class="card-title">Par plateforme</p>
      <div class="plat-grid" id="plat-grid"></div>
    </div>
  </div>

</div>

<script>
const STATUS_COLORS = {
  "Envoyée":"#6366f1","En attente":"#f59e0b","Entretien":"#10b981","Refus":"#ef4444","Offre":"#8b5cf6"
};
const PLAT_COLORS = ["#6366f1","#8b5cf6","#10b981","#f59e0b"];
const PLATFORMS_LIST = ["LinkedIn","Indeed","Welcome to the Jungle","Autre"];

let currentPlatform = "LinkedIn";
let currentOutput = "email";
let generatedEmail = "";
let generatedLetter = "";
let currentFilter = "Tout";
let applications = JSON.parse(localStorage.getItem("jobpilot_apps") || "[]");

if (applications.length === 0) {
  applications = [
    {id:1,company:"Doctolib",role:"Développeur React",platform:"LinkedIn",date:"2026-03-20",status:"Entretien"},
    {id:2,company:"BlaBlaCar",role:"Product Manager",platform:"Indeed",date:"2026-03-18",status:"En attente"},
    {id:3,company:"Contentsquare",role:"UX Designer",platform:"Welcome to the Jungle",date:"2026-03-15",status:"Refus"},
  ];
  saveApps();
}

function saveApps() { localStorage.setItem("jobpilot_apps", JSON.stringify(applications)); }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['gen','tracker','stats'][i]===tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='stats') renderStats();
  if(tab==='tracker') renderApps();
}

function setPlatform(el, p) {
  currentPlatform = p;
  document.querySelectorAll('.plat').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

async function handleGenerate() {
  const cv = document.getElementById('cv').value.trim();
  const offer = document.getElementById('offer').value.trim();
  const apiKey = document.getElementById('apikey').value.trim();
  const errEl = document.getElementById('gen-err');

  if (!cv || !offer) { showErr("Veuillez renseigner votre CV et l'offre d'emploi."); return; }
  if (!apiKey) { showErr("Veuillez entrer votre clé API Anthropic."); return; }

  errEl.style.display = 'none';
  const btn = document.getElementById('btn-gen');
  btn.disabled = true; btn.textContent = "✦ Génération en cours...";

  try {
    const prompt = `Tu es un expert en recrutement. Voici le CV :\n---\n${cv}\n---\nOffre sur ${currentPlatform} :\n---\n${offer}\n---\n\nGénère :\n1. Un email de candidature court (5-8 lignes) avec objet.\n2. Une lettre de motivation (3 paragraphes).\n\nSépare par "---LETTRE---". Commence directement par l'email.`;

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const text = data.content.map(b => b.text||"").join("");
    const parts = text.split("---LETTRE---");
    generatedEmail = parts[0]?.trim() || text;
    generatedLetter = parts[1]?.trim() || "";

    document.getElementById('output-section').style.display = 'flex';
    showOutput('email');

    // Auto-add to tracker
    applications.unshift({
      id: Date.now(),
      company: "Entreprise",
      role: "Poste",
      platform: currentPlatform,
      date: new Date().toISOString().slice(0,10),
      status: "Envoyée"
    });
    saveApps();

  } catch(e) {
    showErr("Erreur : " + e.message);
  }

  btn.disabled = false; btn.textContent = "✦ Générer la candidature";
}

function showErr(msg) {
  const el = document.getElementById('gen-err');
  el.textContent = msg; el.style.display = 'block';
}

function switchOutput(type, el) {
  currentOutput = type;
  document.querySelectorAll('.out-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  showOutput(type);
}

function showOutput(type) {
  document.getElementById('output-box').textContent = type === 'email' ? generatedEmail : generatedLetter;
}

function copyOutput() {
  const text = currentOutput === 'email' ? generatedEmail : generatedLetter;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Copié'; setTimeout(() => btn.textContent = 'Copier', 1500);
  });
}

// TRACKER
function renderApps() {
  const list = document.getElementById('app-list');
  const filtered = currentFilter === 'Tout' ? applications : applications.filter(a => a.status === currentFilter);
  if (!filtered.length) { list.innerHTML = '<p class="empty">Aucune candidature</p>'; return; }

  list.innerHTML = filtered.map(app => `
    <div class="app-item">
      <div class="app-top">
        <div>
          <div class="app-company">${app.company}</div>
          <div class="app-role">${app.role}</div>
        </div>
        <button class="del-btn" onclick="deleteApp(${app.id})">×</button>
      </div>
      <div class="app-meta">
        <span class="app-platform">${app.platform}</span>
        <span class="app-date">${app.date}</span>
        <select class="status-sel" onchange="updateStatus(${app.id},this.value)"
          style="background:${STATUS_COLORS[app.status]}22;color:${STATUS_COLORS[app.status]};border-color:${STATUS_COLORS[app.status]}44">
          ${["Envoyée","En attente","Entretien","Refus","Offre"].map(s=>`<option${s===app.status?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
  `).join('');
}

function addApplication() {
  const company = document.getElementById('t-company').value.trim();
  const role = document.getElementById('t-role').value.trim();
  if (!company || !role) return;
  applications.unshift({
    id: Date.now(),
    company, role,
    platform: document.getElementById('t-platform').value,
    date: new Date().toISOString().slice(0,10),
    status: document.getElementById('t-status').value
  });
  saveApps();
  document.getElementById('t-company').value = '';
  document.getElementById('t-role').value = '';
  renderApps();
}

function updateStatus(id, status) {
  applications = applications.map(a => a.id===id ? {...a, status} : a);
  saveApps();
}

function deleteApp(id) {
  applications = applications.filter(a => a.id !== id);
  saveApps(); renderApps();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderApps();
}

function exportCSV() {
  const rows = ["Entreprise,Poste,Plateforme,Date,Statut", ...applications.map(a=>`"${a.company}","${a.role}","${a.platform}","${a.date}","${a.status}"`)];
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='candidatures.csv'; a.click();
}

// STATS
function renderStats() {
  const total = applications.length;
  const byStatus = s => applications.filter(a=>a.status===s).length;
  const successRate = total ? Math.round((byStatus('Entretien')+byStatus('Offre'))/total*100) : 0;

  document.getElementById('kpis').innerHTML = [
    {icon:'📋',val:total,label:'Total'},
    {icon:'🎯',val:successRate+'%',label:'Taux succès'},
    {icon:'💬',val:byStatus('Entretien'),label:'Entretiens'},
    {icon:'🏆',val:byStatus('Offre'),label:'Offres'}
  ].map(k=>`<div class="kpi"><div class="kpi-icon">${k.icon}</div><div class="kpi-val">${k.val}</div><div class="kpi-label">${k.label}</div></div>`).join('');

  document.getElementById('status-bars').innerHTML = Object.entries(STATUS_COLORS).map(([s,c])=>{
    const count = byStatus(s);
    const pct = total ? (count/total*100) : 0;
    return `<div class="bar-row"><div class="bar-label"><span style="font-size:13px;color:#d4d0e8">${s}</span><span style="font-size:13px;font-weight:600;color:${c}">${count}</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div></div>`;
  }).join('');

  document.getElementById('plat-grid').innerHTML = PLATFORMS_LIST.map((p,i)=>`
    <div class="plat-card">
      <div class="plat-val" style="color:${PLAT_COLORS[i]}">${applications.filter(a=>a.platform===p||a.platform==='WTTJ'&&p==='Welcome to the Jungle').length}</div>
      <div class="plat-name">${p}</div>
    </div>
  `).join('');
}

renderApps();
</script>
</body>
</html>
